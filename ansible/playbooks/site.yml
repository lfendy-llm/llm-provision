---
- name: Bootstrap Ubuntu Server
  hosts: local
  become: yes
  gather_facts: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Ensure git is installed
      apt:
        name: git
        state: present
