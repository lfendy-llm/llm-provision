---
- name: Ensure devuser exists
  user:
    name: devuser
    state: present
    shell: /bin/bash
    create_home: yes

- name: Ensure devuser has passwordless sudo
  copy:
    dest: /etc/sudoers.d/devuser
    content: "devuser ALL=(ALL) NOPASSWD:ALL\n"
    mode: '0440'
    owner: root
    group: root
