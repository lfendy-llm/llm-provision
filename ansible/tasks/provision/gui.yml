---
- name: Ensuring lightweight GUI is present (openbox xorg)
  become: yes
  become_user: root
  block:
    - name: Ensure xorg is present
      apt:
        name: xorg
        state: present

    - name: Ensure openbox is present (without recommends)
      apt:
        name: openbox
        state: present
        install_recommends: no

    - name: Ensure firefox is present
      apt:
        name: firefox
        state: present

    - name: Ensure x-www-browser points to firefox
      community.general.alternatives:
        name: x-www-browser
        link: /usr/bin/x-www-browser
        path: /usr/bin/firefox
        priority: 50
