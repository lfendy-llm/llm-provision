---
- name: Pi coding agent
  become: yes
  become_user: root
  block:
    - name: Ensure nodejs is installed
      apt:
        name: nodejs
        state: present

    - name: Ensure npm is installed
      apt:
        name: npm
        state: present

    - name: Ensure pi.dev is installed globally
      npm:
        name: "@earendil-works/pi-coding-agent"
        global: yes
        state: present
