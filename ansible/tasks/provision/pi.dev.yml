---
- name: Pi coding agent
  become: yes
  become_user: root
  block:
    - name: Check if pi is already installed
      ansible.builtin.command:
        cmd: which pi
      register: pi_check
      ignore_errors: yes
      changed_when: no

    - name: Install pi.dev
      ansible.builtin.shell:
        cmd: curl -fsSL https://pi.dev/install.sh | sh
      when: pi_check.rc != 0
