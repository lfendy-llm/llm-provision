---
- name: Pi coding agent
  become: yes
  become_user: root
  block:
    - name: Check node version
      ansible.builtin.command:
        cmd: node --version
      register: node_version
      changed_when: no
      ignore_errors: yes

    - name: Install Node.js 22.x from NodeSource
      when: node_version.rc != 0 or (node_version.stdout.split()[0] | regex_replace('^v', '')) is version('22', '<')
      block:
        - name: Remove outdated Ubuntu nodejs if present
          apt:
            name: nodejs
            state: absent

        - name: Install Node.js 22.x
          ansible.builtin.shell:
            cmd: |
              curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
              apt-get install -y nodejs

    - name: Ensure pi.dev is installed globally
      npm:
        name: "@earendil-works/pi-coding-agent"
        global: yes
        state: present

- name: Pi packages (devuser)
  become: yes
  become_user: devuser
  block:
    - name: Install pi packages
      ansible.builtin.command:
        cmd: "pi install npm:{{ item }}"
      register: pi_install_result
      changed_when: "'up to date' not in pi_install_result.stdout"
      loop:
        - "@demigodmode/pi-web-agent"
        - "@ctogg/pi-cost-counter"
        - pi-deepseek-optimized
        - pi-patty-bg-tasks
