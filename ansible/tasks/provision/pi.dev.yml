---
- name: Pi coding agent
  become: yes
  become_user: root
  block:
    - name: Check node version
      ansible.builtin.command:
        cmd: node --version
      register: node_version
      changed_when: no
      ignore_errors: yes

    - name: Install Node.js 22.x from NodeSource
      when: node_version.rc != 0 or (node_version.stdout.split()[0] | regex_replace('^v', '')) is version('22', '<')
      block:
        - name: Remove outdated Ubuntu nodejs if present
          apt:
            name: nodejs
            state: absent

        - name: Install Node.js 22.x
          ansible.builtin.shell:
            cmd: |
              curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
              apt-get install -y nodejs

    - name: Install pi.dev
      ansible.builtin.shell:
        cmd: curl -fsSL https://pi.dev/install.sh | sh

- name: Pi packages (devuser)
  become: yes
  become_user: devuser
  block:
    - name: Install pi-web-agent
      ansible.builtin.command:
        cmd: pi install npm:@demigodmode/pi-web-agent
      register: web_agent
      changed_when: "'already installed' not in web_agent.stdout"

    - name: Install pi-cost-counter
      ansible.builtin.command:
        cmd: pi install npm:@ctogg/pi-cost-counter
      register: cost_counter
      changed_when: "'already installed' not in cost_counter.stdout"
