---
- name: Pi coding agent
  become: yes
  become_user: root
  block:
    - name: Check node version
      ansible.builtin.command:
        cmd: node --version
      register: node_version
      changed_when: no
      ignore_errors: yes

    - name: Install Node.js 22.x from NodeSource
      when: node_version.rc != 0 or node_version.stdout is version('22', '<')
      block:
        - name: Run NodeSource setup script
          ansible.builtin.shell:
            cmd: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -

        - name: Install nodejs from NodeSource
          apt:
            name: nodejs
            state: present
            update_cache: yes

    - name: Ensure pi.dev is installed globally
      npm:
        name: "@earendil-works/pi-coding-agent"
        global: yes
        state: present

- name: Pi packages (devuser)
  become: yes
  become_user: devuser
  block:
    - name: Install pi-deepseek-optimised
      ansible.builtin.command:
        cmd: pi install npm:pi-deepseek-optimised
      register: deepseek
      changed_when: "'already installed' not in deepseek.stdout"

    - name: Install pi-web-agent
      ansible.builtin.command:
        cmd: pi install npm:@demigodmode/pi-web-agent
      register: web_agent
      changed_when: "'already installed' not in web_agent.stdout"

    - name: Install pi-cost-counter
      ansible.builtin.command:
        cmd: pi install npm:@ctogg/pi-cost-counter
      register: cost_counter
      changed_when: "'already installed' not in cost_counter.stdout"
